name: Deploy Next.js Static

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - uses: actions/checkout@v3

      # 2️⃣ Setup Node.js di runner
      - uses: actions/setup-node@v3
        with:
          node-version: "22"

      # 3️⃣ Install dependencies dan build static site
      - run: |
          npm install
          npm run build
          npm run export   # hasilnya di folder "out/"

      # 4️⃣ Setup SSH agent dengan private key
      - uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      # 5️⃣ Upload folder "out/" ke VPS
      - name: Upload static files to VPS
        run: |
          rsync -avz --delete out/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.DEPLOY_PATH }}

      # 6️⃣ (Opsional) Reload Nginx jika menggunakan web server
      - name: Reload Nginx on VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "sudo systemctl reload nginx"
